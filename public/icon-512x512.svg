<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" fill="#2563eb" rx="120"/>
  
  <!-- Clock face circle -->
  <circle cx="256" cy="256" r="160" fill="white" stroke="#2563eb" stroke-width="4"/>
  
  <!-- Clock numbers (12, 3, 6, 9) with larger font -->
  <text x="256" y="110" text-anchor="middle" font-size="48" font-weight="bold" fill="#2563eb">12</text>
  <text x="402" y="270" text-anchor="middle" font-size="48" font-weight="bold" fill="#2563eb">3</text>
  <text x="256" y="420" text-anchor="middle" font-size="48" font-weight="bold" fill="#2563eb">6</text>
  <text x="110" y="270" text-anchor="middle" font-size="48" font-weight="bold" fill="#2563eb">9</text>
  
  <!-- Hour hand -->
  <line x1="256" y1="256" x2="256" y2="160" stroke="#2563eb" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Minute hand -->
  <line x1="256" y1="256" x2="340" y2="256" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="#2563eb"/>
</svg>
