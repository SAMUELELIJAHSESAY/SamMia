<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- Background -->
  <rect width="180" height="180" fill="#2563eb" rx="40"/>
  
  <!-- Clock face circle -->
  <circle cx="90" cy="90" r="55" fill="white" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Clock numbers (12, 3, 6, 9) -->
  <text x="90" y="47" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">12</text>
  <text x="133" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">3</text>
  <text x="90" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">6</text>
  <text x="47" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">9</text>
  
  <!-- Hour hand -->
  <line x1="90" y1="90" x2="90" y2="65" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Minute hand -->
  <line x1="90" y1="90" x2="110" y2="90" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="90" cy="90" r="4" fill="#2563eb"/>
</svg>
